services:
  database:
    image: postgres:17-alpine
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER} -d ${DB_NAME}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend

    restart: unless-stopped

    env_file:
      - ./backend/.env

    environment:
      APP_ENV: production
      DEBUG: "False"
      ENABLE_DOCS: "False"

      DB_HOST: database
      DB_PORT: "5432"

      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-localhost,127.0.0.1,backend}

    depends_on:
      database:
        condition: service_healthy

    volumes:
      - backend_uploads:/app/uploads
      - huggingface_cache:/app/.cache/huggingface

    ports:
      - "8000:8000"

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')",
        ]
      interval: 20s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}

    restart: unless-stopped

    depends_on:
      backend:
        condition: service_healthy

    ports:
      - "8080:80"


volumes:
  postgres_data:
  backend_uploads:
  huggingface_cache: