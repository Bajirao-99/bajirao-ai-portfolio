name: Portfolio CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine

        env:
          POSTGRES_DB: bajirao_ai_portfolio_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U postgres -d bajirao_ai_portfolio_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      APP_NAME: Bajirao AI Portfolio API
      APP_VERSION: 1.0.0
      APP_ENV: test
      DEBUG: "False"
      ENABLE_DOCS: "True"
      LOG_LEVEL: INFO

      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/bajirao_ai_portfolio_test

      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: bajirao_ai_portfolio_test
      DB_USER: postgres
      DB_PASSWORD: postgres

      CORS_ORIGINS: http://localhost:5173
      TRUSTED_HOSTS: localhost,127.0.0.1,testserver

      JWT_SECRET_KEY: test-only-jwt-secret-that-is-long-enough-for-ci
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"

      GEMINI_API_KEY: test-only-api-key
      GEMINI_MODEL_NAME: test-model

      EMBEDDING_MODEL_NAME: sentence-transformers/all-MiniLM-L6-v2

      CHAT_RETRIEVAL_TOP_K: "6"
      CHAT_MIN_RELEVANCE_SCORE: "0.12"
      CHAT_RATE_LIMIT: "10"
      CHAT_RATE_WINDOW_MINUTES: "10"

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run database migrations
        run: alembic upgrade head

      - name: Run backend tests
        run: pytest

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_BASE_URL: https://bajirao-ai-portfolio-api.onrender.com
        run: npm run build